<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Racco</title>

<style>
:root{
  --bg1:#0d0d10;
  --bg2:#17171c;
  --bg3:#24242b;
  --text:#f5f5f3;
  --muted:#b8b8b4;
  --line:rgba(255,255,255,0.08);
  --hover:#ffffff;
  --cloud-dancer:#f0ede8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  font-family:"Times New Roman", Times, serif;
  font-size:17px;
  position:relative;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.7;
  transition:background .4s ease, color .4s ease;
}

/* background image layer */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  pointer-events:none;
  z-index:-3;
  transition:opacity .6s ease, filter .6s ease;
}

/* subtle grain */
/* subtle grain / grid layer */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
  z-index:-2;
  opacity:.18;
}

body.night{
  color:var(--text);
  background:
    repeating-linear-gradient(
      110deg,
      rgba(90,130,255,0.08) 0,
      rgba(90,130,255,0.08) 1px,
      transparent 1px,
      transparent 26px
    ),
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.02) 0,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 44px
    ),
    linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
}

body.night::before{
  /* 可替换成你自己的宇宙星空图 */
  background-image:
    linear-gradient(rgba(4,8,20,.68), rgba(4,8,20,.68)),
    url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=2000&q=80");
  opacity:.92;
}

body.day{
  --text:#1f2530;
  --muted:#4c586a;
  --line:rgba(31,37,48,0.16);
  --hover:#1f2530;
  color:var(--text);
  background:
    repeating-linear-gradient(
      112deg,
      rgba(105,130,174,0.08) 0,
      rgba(105,130,174,0.08) 1px,
      transparent 1px,
      transparent 36px
    ),
    linear-gradient(135deg, var(--cloud-dancer), #f7f4ef, #ece8e2);
}

body.day::before{
  /* 可替换成你自己的白云图 */
  background-image:
    linear-gradient(rgba(240,237,232,.55), rgba(240,237,232,.55)),
    url("https://images.unsplash.com/photo-1534088568595-a066f410bcda?auto=format&fit=crop&w=2000&q=80");
  opacity:.86;
  filter:saturate(108%);
}

.theme-toggle{
  position:fixed;
  top:22px;
  right:24px;
  width:52px;
  height:52px;
  border-radius:50%;
  border:1px solid var(--line);
  background:rgba(8,14,28,0.35);
  backdrop-filter:blur(8px);
  color:var(--text);
  font-size:26px;
  cursor:pointer;
  z-index:40;
  transition:transform .2s ease, background .3s ease, color .3s ease, border-color .3s ease;
}

body.day .theme-toggle{
  background:rgba(255,255,255,.55);
}

.theme-toggle:hover{
  transform:translateY(-2px) scale(1.04);
}

.clouds,
.stars{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:-1;
}

.clouds{ opacity:0; transition:opacity .4s ease; }
.stars{ opacity:0; transition:opacity .4s ease; }

body.day .clouds{ opacity:1; }
body.night .stars{ opacity:1; }

.cloud{
  position:absolute;
  width:220px;
  height:70px;
  background:rgba(255,255,255,0.26);
  border-radius:999px;
  filter:blur(1px);
  animation:floatCloud linear infinite;
}

.cloud::before,
.cloud::after{
  content:"";
  position:absolute;
  background:inherit;
  border-radius:999px;
}

.cloud::before{
  width:110px;
  height:80px;
  top:-30px;
  left:26px;
}

.cloud::after{
  width:95px;
  height:65px;
  top:-20px;
  left:102px;
}

.cloud.c1{ top:16%; left:-20%; animation-duration:36s; }
.cloud.c2{ top:33%; left:-26%; transform:scale(.8); animation-duration:48s; }
.cloud.c3{ top:61%; left:-22%; transform:scale(.95); animation-duration:41s; }

.star{
  position:absolute;
  width:3px;
  height:3px;
  border-radius:50%;
  background:rgba(255,255,255,.95);
  box-shadow:0 0 8px rgba(255,255,255,.6);
  animation:twinkle 1.5s ease-in-out infinite;
}

.star.s1{ top:12%; left:11%; animation-delay:.1s; }
.star.s2{ top:17%; left:28%; animation-delay:.6s; }
.star.s3{ top:23%; left:59%; animation-delay:.2s; }
.star.s4{ top:31%; left:76%; animation-delay:.8s; }
.star.s5{ top:39%; left:19%; animation-delay:.45s; }
.star.s6{ top:44%; left:47%; animation-delay:1.1s; }
.star.s7{ top:55%; left:68%; animation-delay:.25s; }
.star.s8{ top:62%; left:84%; animation-delay:.9s; }
.star.s9{ top:69%; left:31%; animation-delay:.15s; }
.star.s10{ top:78%; left:57%; animation-delay:.7s; }
}

/* layout */
.wrapper{
  display:grid;
  grid-template-columns: 42% 58%;
  min-height:100vh;
}

/* left fixed panel */
.left{
  position:sticky;
  top:0;
  height:100vh;
  padding:72px 64px;
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  animation:fadeUp 1.1s ease forwards;
}

.brand{
  font-family:"Times New Roman", Times, serif;
  font-size:72px;
  font-size:66px;
  font-weight:400;
  letter-spacing:-0.03em;
  line-height:0.95;
  margin-bottom:22px;
}

.subtitle{
  max-width:420px;
  color:var(--muted);
  font-size:17px;
  font-size:21px;
  line-height:1.5;
}

.small{
  font-size:12px;
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:14px;
}

.meta{
  color:var(--muted);
  font-size:14px;
  font-size:21px;
  line-height:1.5;
}

/* right content */
.right{
  padding:72px 72px 100px;
}

section{
  padding:0 0 76px;
  margin-bottom:76px;
  border-bottom:1px solid var(--line);
  opacity:0;
  transform:translateY(24px);
  animation:fadeUp .9s ease forwards;
}

section:nth-child(1){animation-delay:.15s;}
section:nth-child(2){animation-delay:.28s;}
section:nth-child(3){animation-delay:.4s;}
section:nth-child(4){animation-delay:.52s;}
section:nth-child(5){animation-delay:.64s;}

h2{
  font-family:"Times New Roman", Times, serif;
  font-size:42px;
  font-size:40px;
  font-weight:400;
  margin-bottom:22px;
  letter-spacing:-0.02em;
}

p{
  color:var(--muted);
  max-width:680px;
  font-size:17px;
  font-size:20px;
  line-height:1.6;
}

.list{
  display:grid;
  gap:16px;
}

.item{
  padding:18px 0;
  border-top:1px solid var(--line);
}

.item-title{
  font-size:18px;
  font-size:28px;
  margin-bottom:6px;
}

.item-desc{
  color:var(--muted);
  font-size:15px;
  font-size:20px;
}

.links{
  display:flex;
  flex-wrap:wrap;
  gap:18px;
}

a{
  color:var(--text);
  text-decoration:none;
  position:relative;
  transition:opacity .25s ease, transform .25s ease;
}

a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0%;
  height:1px;
  background:var(--hover);
  transition:width .25s ease;
}

a:hover{
  opacity:1;
  transform:translateY(-2px);
}

a:hover::after{
  width:100%;
}

.time{
  margin-top:24px;
  color:var(--muted);
  font-size:13px;
  font-size:18px;
}

/* mobile */
@media (max-width: 980px){
  .wrapper{
    grid-template-columns:1fr;
  }

  .left{
    position:relative;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--line);
    padding:48px 26px;
    gap:42px;
  }

  .brand{
    font-size:54px;
    font-size:52px;
  }

  .right{
    padding:42px 26px 72px;
  }

  h2{
    font-size:34px;
  }

  .theme-toggle{
    top:14px;
    right:14px;
    width:46px;
    height:46px;
    font-size:23px;
  }
}

/* animation */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(26px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes floatCloud{
  from{ transform:translateX(0); }
  to{ transform:translateX(150vw); }
}

@keyframes twinkle{
  0%,100%{ opacity:.2; transform:scale(.9); }
  50%{ opacity:1; transform:scale(1.3); }
}
</style>
</head>

<script>
function updateClock(){
  const now = new Date();
  const options = {
    year:'numeric',
    month:'short',
    day:'numeric',
    hour:'2-digit',
    minute:'2-digit'
  };
  document.getElementById('clock').textContent =
    now.toLocaleString('en-US', options);
}
updateClock();
setInterval(updateClock,1000);

const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') || 'night';
setTheme(savedTheme);

themeToggle.addEventListener('click', () => {
  const nextTheme = document.body.classList.contains('day') ? 'night' : 'day';
  setTheme(nextTheme);
  localStorage.setItem('theme', nextTheme);
});

function setTheme(theme){
  document.body.classList.remove('day', 'night');
  document.body.classList.add(theme);
  themeToggle.textContent = theme === 'day' ? '☀️' : '🌙';
  themeToggle.setAttribute('aria-label', theme === 'day' ? '切换到夜间模式' : '切换到日间模式');
}
</script>

</body>
</html>
