<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Racco</title>

  <style>
    /* ======================
       BASE
    ====================== */
    body {
      margin: 0;

      /* 🧠 强制 Times New Roman */
      font-family: "Times New Roman", Times, serif !important;

      line-height: 1.7;

      transition: background 0.5s ease, color 0.5s ease;
    }

    .container {
      max-width: 720px;
      margin-left: 10vw;
      margin-right: auto;
      padding: 120px 24px;
    }

    /* ======================
       ☀️ LIGHT MODE
    ====================== */
    body.light {
      background: radial-gradient(circle at top, #ffffff 0%, #f5f5f7 40%, #eceaf0 100%);
      color: #1d1d1f;
    }

    body.light p { color: #6e6e73; }
    body.light .meta { color: #9a9aa0; }
    body.light .title { color: #C5AEB1; }
    body.light .section {
      border-left: 1px solid rgba(197,174,177,0.28);
    }
    body.light a {
      border-bottom: 1px solid rgba(197,174,177,0.4);
    }

    /* ======================
       🌙 DARK MODE
    ====================== */
    body.dark {
      background: radial-gradient(circle at top, #1a1420 0%, #120d18 50%, #0d0a12 100%);
      color: #e8e6ea;
    }

    body.dark p { color: #b9b4c2; }
    body.dark .meta { color: #9a94a8; }
    body.dark .title { color: #C5AEB1; }
    body.dark .section {
      border-left: 1px solid rgba(197,174,177,0.22);
    }
    body.dark a {
      border-bottom: 1px solid rgba(197,174,177,0.35);
    }
    body.dark .item:hover {
      color: #ffffff;
    }

    /* ======================
       STRUCTURE
    ====================== */
    h1 {
      font-size: 42px;
      font-weight: 500;
      margin: 0 0 14px;
    }

    p {
      font-size: 18px;
      margin: 0 0 24px;
    }

    .section {
      margin-top: 64px;
      padding-left: 14px;
      transition: transform 0.25s ease;
    }

    .section:hover {
      transform: translateY(-2px);
    }

    .title {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .meta {
      font-size: 12px;
      margin-bottom: 6px;
    }

    .item {
      font-size: 17px;
      margin: 6px 0;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .item:hover {
      transform: translateX(3px);
    }

    /* lilac dot */
    .dot {
      width: 6px;
      height: 6px;
      background: #C5AEB1;
      border-radius: 50%;
      display: inline-block;
      margin-right: 10px;
      position: relative;
      top: -1px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ======================
       TOGGLE BUTTON
    ====================== */
    .toggle {
      position: fixed;
      top: 24px;
      right: 24px;

      font-size: 16px;
      padding: 10px 12px;

      border-radius: 999px;
      cursor: pointer;

      background: transparent;
      border: 1px solid rgba(197,174,177,0.4);

      transition: transform 0.2s ease;
    }

    .toggle:hover {
      transform: scale(1.05);
    }

  </style>
</head>

<body>

  <!-- 🌗 切换按钮 -->
  <button class="toggle" onclick="toggleTheme()">
    <span id="icon">🌙</span>
  </button>

  <div class="container">

    <h1><span class="dot"></span>Hi, I'm Racco</h1>

    <p>
      I build things when I feel like it.<br>
      Exploring ideas on the internet.
    </p>

    <!-- 🌤 NOW -->
    <div class="section">
      <div class="title">Now</div>
      <div class="meta">2026 · current state</div>
      <div class="item">Building a small personal site</div>
      <div class="item">Thinking too much, sometimes</div>
    </div>

    <!-- 🧠 NOTES -->
    <div class="section">
      <div class="title">Notes</div>
      <div class="meta">2026 · fragments</div>
      <div class="item">I wanted to make a website, so I did.</div>
      <div class="item">Then I realized it doesn’t have to be perfect.</div>
    </div>

    <!-- 🔗 LINKS -->
    <div class="section">
      <div class="title">Links</div>
      <div class="item">
        <a href="https://x.com/Heisracco" target="_blank">X</a> ·
        <a href="https://www.instagram.com/heisracco/" target="_blank">Instagram</a>
      </div>
    </div>

  </div>

  <script>
    // 初始化主题
    const saved = localStorage.getItem("theme") || "light";
    document.body.classList.add(saved);
    updateIcon(saved);

    function toggleTheme() {
      if (document.body.classList.contains("light")) {
        document.body.classList.replace("light", "dark");
        localStorage.setItem("theme", "dark");
        updateIcon("dark");
      } else {
        document.body.classList.replace("dark", "light");
        localStorage.setItem("theme", "light");
        updateIcon("light");
      }
    }

    function updateIcon(theme) {
      const icon = document.getElementById("icon");

      if (theme === "light") {
        icon.textContent = "🌙"; // 当前是白天 → 显示月亮（提示可切夜晚）
      } else {
        icon.textContent = "☀️"; // 当前是夜晚 → 显示太阳（提示可切白天）
      }
    }
  </script>

</body>
</html>
