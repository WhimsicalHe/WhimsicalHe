<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Racco</title>

<style>

/* 🧠 强制全局字体 */
* {
  font-family: "Times New Roman", Times, serif !important;
}

/* ======================
   BASE
====================== */
body {
  margin: 0;
  color: #ffffff;
}

/* ======================
   🌌 背景图层
====================== */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("https://images.unsplash.com/photo-1520975922284-9a2b4a2c8c63");
  background-size: cover;
  background-position: center;

  filter: brightness(0.6) contrast(1.1);
  z-index: -2;
}

/* 🌫 氛围遮罩 */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: radial-gradient(
    circle at left,
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.78)
  );

  z-index: -1;
}

/* ======================
   LAYOUT（横版）
====================== */
.layout {
  display: flex;
  height: 100vh;
}

/* 左侧文字 */
.left {
  width: 50%;
  padding: 120px 80px;
  box-sizing: border-box;

  /* 🧠 轻微上移，让视觉更“漂” */
  transform: translateY(-8px);
}

/* 右侧（背景展示） */
.right {
  width: 50%;
}

/* ======================
   TEXT
====================== */
h1 {
  font-size: 44px;
  margin: 0 0 20px;

  /* ❗ 去掉默认粗体 */
  font-weight: 400;
  letter-spacing: -0.01em;
}

p {
  font-size: 18px;
  opacity: 0.75;
  font-weight: 400;
}

.title {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;

  margin-top: 40px;
  color: rgba(255,255,255,0.6);
  font-weight: 400;
}

.item {
  font-size: 17px;
  margin: 6px 0;
  color: rgba(255,255,255,0.9);
  font-weight: 400;
}

/* ======================
   LINKS
====================== */
a {
  color: #ffffff;
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.35);
}

a:hover {
  border-bottom: 1px solid rgba(255,255,255,0.8);
}

/* ======================
   MOBILE
====================== */
@media (max-width: 768px) {
  .layout {
    flex-direction: column;
  }

  .left {
    width: 100%;
    padding: 80px 24px;
  }

  .right {
    width: 100%;
    height: 40vh;
  }
}

</style>
</head>

<body>

<!-- 🌌 背景 -->
<div class="bg"></div>
<div class="overlay"></div>

<!-- 🧭 主结构 -->
<div class="layout">

  <div class="left">

    <h1>Hi, I'm Racco</h1>

    <p>I build things when I feel like it.</p>

    <div class="title">Now</div>
    <div class="item">Building a personal space</div>
    <div class="item">Thinking too much sometimes</div>

    <div class="title">Notes</div>
    <div class="item">I wanted a website, so I made one.</div>

    <div class="title">Links</div>
    <div class="item">
      <a href="https://x.com/Heisracco" target="_blank">X</a> ·
      <a href="https://www.instagram.com/heisracco/" target="_blank">Instagram</a>
    </div>

  </div>

  <div class="right"></div>

</div>

</body>
</html>
